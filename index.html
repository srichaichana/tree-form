<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tree Data Collection</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; background: linear-gradient(160deg, #050f07 0%, #0b2212 50%, #071a0d 100%); font-family: Georgia, serif; padding: 2rem 1rem; color: #d1fae5; }
    .bg-dots { position: fixed; inset: 0; opacity: 0.025; pointer-events: none; background-image: radial-gradient(circle at 2px 2px, #4ade80 1px, transparent 0); background-size: 36px 36px; }
    .header { text-align: center; margin-bottom: 2rem; }
    .header h1 { color: #86efac; font-size: 1.8rem; font-weight: 700; text-shadow: 0 0 30px #4ade8044; margin: 0.2rem 0 0; }
    .header p { color: #4ade8066; font-size: 0.8rem; font-style: italic; margin: 0.3rem 0 0; }
    .badge { display: inline-block; margin-top: 0.8rem; border-radius: 20px; padding: 0.35rem 1rem; font-size: 0.82rem; }
    .badge-success { background: #14532d; border: 1px solid #4ade80; color: #86efac; }
    .badge-error { background: #450a0a; border: 1px solid #dc2626; color: #fca5a5; }
    .badge-count { background: #14532d44; border: 1px solid #4ade8033; color: #86efac; }
    .token-bar { max-width: 680px; margin: 0 auto 1.2rem; background: rgba(7,20,10,0.85); border: 1px solid #fbbf2444; border-radius: 12px; padding: 1rem 1.5rem; display: flex; align-items: center; gap: 0.8rem; flex-wrap: wrap; }
    .token-bar label { color: #fbbf24; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; }
    .token-bar input { flex: 1; min-width: 200px; background: #071a0d; border: 1px solid #fbbf2433; border-radius: 8px; padding: 0.5rem 0.75rem; color: #fef3c7; font-size: 0.85rem; outline: none; font-family: monospace; }
    .token-bar input:focus { border-color: #fbbf2466; }
    .token-status { font-size: 0.75rem; color: #fbbf2488; white-space: nowrap; }
    .card { max-width: 680px; margin: 0 auto; background: rgba(7,20,10,0.85); border: 1px solid #4ade8022; border-radius: 16px; padding: 2rem; backdrop-filter: blur(12px); box-shadow: 0 24px 64px rgba(0,0,0,0.6); }
    .section { margin-bottom: 1.8rem; }
    .section-title { color: #86efac; font-size: 0.8rem; font-weight: 700; letter-spacing: 0.06em; border-bottom: 1px solid #4ade8022; padding-bottom: 0.5rem; margin-bottom: 1rem; }
    label { color: #86efac99; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; display: block; margin-bottom: 0.3rem; }
    input[type=text], input[type=number] { width: 100%; background: #071a0d; border: 1px solid #4ade8022; border-radius: 8px; padding: 0.55rem 0.75rem; color: #d1fae5; font-size: 0.88rem; outline: none; transition: border-color 0.2s; font-family: Georgia, serif; }
    input:focus { border-color: #4ade8066; }
    input.italic { font-style: italic; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.8rem; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
    .field { margin-bottom: 0.8rem; }
    .branch-row { display: flex; gap: 0.5rem; margin-bottom: 0.45rem; align-items: center; }
    .branch-num { width: 26px; height: 26px; border-radius: 50%; background: #14532d; border: 1px solid #4ade8044; display: flex; align-items: center; justify-content: center; color: #86efac; font-size: 0.68rem; font-weight: 700; flex-shrink: 0; }
    .btn-remove { background: #7f1d1d44; border: 1px solid #dc262633; color: #f87171; border-radius: 6px; width: 26px; height: 26px; cursor: pointer; flex-shrink: 0; font-size: 1rem; }
    .btn-add { background: transparent; border: 1px dashed #4ade8033; color: #4ade80; border-radius: 8px; padding: 0.35rem 0.9rem; cursor: pointer; font-size: 0.78rem; margin-top: 0.3rem; font-family: Georgia, serif; }
    .btn-add:hover { border-color: #4ade80; }
    .compass { display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: auto auto auto; gap: 0.5rem; max-width: 340px; margin: 0 auto; }
    .compass-center { display: flex; align-items: center; justify-content: center; }
    .tree-icon { width: 52px; height: 52px; border-radius: 50%; border: 2px solid #4ade8033; background: radial-gradient(circle, #14532d, #050f07); display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }
    .mini-label { color: #86efac66; font-size: 0.65rem; text-align: center; display: block; margin-bottom: 0.25rem; text-transform: none; letter-spacing: 0; }
    .mini-input { text-align: center !important; padding: 0.45rem 0.4rem !important; }
    .crown-total { margin-top: 1.2rem; text-align: center; background: #14532d22; border: 1px solid #4ade8022; border-radius: 10px; padding: 0.75rem; }
    .crown-total span { color: #86efac88; font-size: 0.78rem; }
    .crown-total strong { color: #4ade80; font-size: 1.3rem; margin-left: 0.6rem; }
    .error-box { color: #fca5a5; font-size: 0.82rem; margin-bottom: 1rem; text-align: center; background: #450a0a55; border: 1px solid #dc262633; border-radius: 8px; padding: 0.6rem; }
    .btn-submit { width: 100%; padding: 0.95rem; margin-top: 0.5rem; background: linear-gradient(135deg, #166534, #15803d); border: none; border-radius: 10px; color: #dcfce7; font-size: 1rem; font-weight: 700; cursor: pointer; letter-spacing: 0.04em; transition: all 0.3s; font-family: Georgia, serif; }
    .btn-submit:hover { background: linear-gradient(135deg, #15803d, #16a34a); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-submit.success { background: linear-gradient(135deg,#15803d,#16a34a); box-shadow: 0 0 24px rgba(74,222,128,0.35); }
    .table-card { max-width: 680px; margin: 2rem auto 0; background: rgba(7,20,10,0.8); border: 1px solid #4ade8022; border-radius: 12px; padding: 1.5rem; }
    .table-card h3 { color: #86efac; margin: 0 0 1rem; font-size: 0.95rem; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.76rem; }
    th { color: #4ade80; padding: 0.4rem 0.6rem; border-bottom: 1px solid #4ade8022; text-align: left; white-space: nowrap; }
    td { color: #d1fae5cc; padding: 0.4rem 0.6rem; border-bottom: 1px solid #4ade8011; }
    tr:nth-child(even) { background: #ffffff04; }
    .td-time { color: #86efac66; }
    .td-id { font-weight: 600; }
    .td-bot { font-style: italic; }
    .td-crown { color: #4ade80; font-weight: 700; }
    @media (max-width: 520px) { .grid-3 { grid-template-columns: 1fr; } .grid-2 { grid-template-columns: 1fr; } .card { padding: 1.2rem; } .token-bar { flex-direction: column; align-items: stretch; } }
  </style>
</head>
<body>
<div class="bg-dots"></div>

<div class="header">
  <div style="font-size:2.5rem">&#127795;</div>
  <h1>Tree Data Collection</h1>
  <p>Save to GitHub CSV &rarr; tree-inventory.csv</p>
  <div id="statusBadge"></div>
</div>

<!-- Token Bar -->
<div class="token-bar">
  <label>&#128273; GitHub Token</label>
  <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" oninput="checkToken()" />
  <span class="token-status" id="tokenStatus">&#9679; Not set</span>
</div>

<div class="card">
  <div class="section">
    <div class="section-title">&#128205; Location &amp; ID</div>
    <div class="grid-3">
      <div class="field"><label>Track ID *</label><input type="text" id="trackId" placeholder="T-001" /></div>
      <div class="field"><label>X Coordinate</label><input type="number" id="x" placeholder="100.xxxx" step="any" /></div>
      <div class="field"><label>Y Coordinate</label><input type="number" id="y" placeholder="13.xxxx" step="any" /></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">&#128302; Species Classification</div>
    <div class="field"><label>Thai Name &#3594;&#3639;&#3656;&#3629;&#3652;&#3607;&#3618;</label><input type="text" id="nameThai" placeholder="&#3626;&#3633;&#3585;, &#3605;&#3632;&#3648;&#3588;&#3637;&#3618;&#3609;&#3607;&#3629;&#3591;" /></div>
    <div class="field"><label>Botanical Name</label><input type="text" id="botanical" class="italic" placeholder="Tectona grandis" /></div>
    <div class="grid-2">
      <div class="field"><label>Genus</label><input type="text" id="genus" class="italic" placeholder="Tectona" /></div>
      <div class="field"><label>Species Epithet</label><input type="text" id="speciesepi" class="italic" placeholder="grandis" /></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">&#128207; Measurements</div>
    <div class="grid-2" style="margin-bottom:1rem">
      <div class="field"><label>GBH (cm)</label><input type="number" id="gbh" placeholder="Girth at Breast Height" step="any" /></div>
      <div class="field"><label>Height (m)</label><input type="number" id="height" placeholder="Tree Height" step="any" /></div>
    </div>
    <label style="margin-bottom:0.5rem">Branches GBH (cm)</label>
    <div id="branches"></div>
    <button class="btn-add" onclick="addBranch()">+ Add Branch</button>
  </div>

  <div class="section">
    <div class="section-title">&#127807; Crown Cover (m)</div>
    <div class="compass">
      <div></div>
      <div><span class="mini-label">North &#8593;</span><input type="number" id="crowncoverN" placeholder="0.0" step="any" class="mini-input" oninput="updateTotal()" /></div>
      <div></div>
      <div><span class="mini-label">&#8592; West</span><input type="number" id="crowncovW" placeholder="0.0" step="any" class="mini-input" oninput="updateTotal()" /></div>
      <div class="compass-center"><div class="tree-icon">&#127795;</div></div>
      <div><span class="mini-label">East &#8594;</span><input type="number" id="crowncovE" placeholder="0.0" step="any" class="mini-input" oninput="updateTotal()" /></div>
      <div></div>
      <div><span class="mini-label">South &#8595;</span><input type="number" id="crowncovS" placeholder="0.0" step="any" class="mini-input" oninput="updateTotal()" /></div>
      <div></div>
    </div>
    <div class="crown-total">
      <span>Crown Cover Total (N+S+E+W)</span>
      <strong id="crownTotal">0.00 m</strong>
    </div>
  </div>

  <div id="errorBox" class="error-box" style="display:none"></div>
  <button class="btn-submit" id="submitBtn" onclick="submitForm()">&#128190; Save to GitHub CSV</button>
</div>

<div class="table-card" id="tableCard" style="display:none">
  <h3>&#128203; Records this session</h3>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Time</th><th>Track ID</th><th>Thai Name</th><th>Botanical</th><th>GBH</th><th>Height</th><th>Crown</th></tr></thead>
      <tbody id="recordsBody"></tbody>
    </table>
  </div>
</div>

<script>
  var GITHUB_USER = "srichaichana";
  var GITHUB_REPO = "tree-form";
  var CSV_FILE    = "tree-inventory.csv";
  var CSV_HEADERS = "Timestamp,Track_ID,X,Y,Thai_Name,Botanical,Genus,Speciesepi,GBH,Branches_GBH,Height,Crown_N,Crown_S,Crown_E,Crown_W,Crown_Total\n";

  var records = [];

  window.onload = function() { addBranch(true); };

  function checkToken() {
    var t = document.getElementById("ghToken").value.trim();
    var s = document.getElementById("tokenStatus");
    if (t.startsWith("ghp_") && t.length > 10) {
      s.textContent = "\u2705 Ready";
      s.style.color = "#4ade80";
    } else if (t.length > 0) {
      s.textContent = "\u26a0\ufe0f Invalid format";
      s.style.color = "#fbbf24";
    } else {
      s.textContent = "\u25cf Not set";
      s.style.color = "#fbbf2488";
    }
  }

  function addBranch(first) {
    var container = document.getElementById("branches");
    var idx = container.children.length + 1;
    var row = document.createElement("div");
    row.className = "branch-row";
    row.id = "branch-" + idx;
    row.innerHTML = '<div class="branch-num">' + idx + '</div>'
      + '<input type="number" placeholder="GBH' + idx + '" step="any" style="flex:1;background:#071a0d;border:1px solid #4ade8022;border-radius:8px;padding:0.55rem 0.75rem;color:#d1fae5;font-size:0.88rem;outline:none;" onfocus="this.style.borderColor=\'#4ade8066\'" onblur="this.style.borderColor=\'#4ade8022\'" />'
      + '<button class="btn-remove" onclick="removeBranch(' + idx + ')" style="display:' + (first ? 'none' : 'block') + '">x</button>';
    container.appendChild(row);
  }

  function removeBranch(idx) {
    var el = document.getElementById("branch-" + idx);
    if (el) el.remove();
    var rows = document.querySelectorAll(".branch-row");
    rows.forEach(function(r, i) {
      r.id = "branch-" + (i+1);
      r.querySelector(".branch-num").textContent = i+1;
      r.querySelector("input").placeholder = "GBH" + (i+1);
      r.querySelector("button").setAttribute("onclick","removeBranch(" + (i+1) + ")");
      r.querySelector("button").style.display = rows.length === 1 ? "none" : "block";
    });
  }

  function getBranches() {
    var rows = document.querySelectorAll(".branch-row");
    return Array.from(rows).map(function(r,i) {
      return "GBH"+(i+1)+":"+( r.querySelector("input").value || "");
    }).join("|");
  }

  function updateTotal() {
    var n = parseFloat(document.getElementById("crowncoverN").value)||0;
    var s = parseFloat(document.getElementById("crowncovS").value)||0;
    var e = parseFloat(document.getElementById("crowncovE").value)||0;
    var w = parseFloat(document.getElementById("crowncovW").value)||0;
    var t = (n+s+e+w).toFixed(2);
    document.getElementById("crownTotal").textContent = t + " m";
    return t;
  }

  function csvEscape(v) {
    v = String(v||"");
    if (v.indexOf(",")>=0 || v.indexOf('"')>=0 || v.indexOf("\n")>=0) {
      return '"' + v.replace(/"/g,'""') + '"';
    }
    return v;
  }

  function showBadge(type, msg) {
    document.getElementById("statusBadge").innerHTML = '<div class="badge badge-'+type+'">'+msg+'</div>';
    if (type !== "count") setTimeout(updateCountBadge, 3500);
  }

  function updateCountBadge() {
    if (records.length > 0) {
      document.getElementById("statusBadge").innerHTML = '<div class="badge badge-count">&#128203; '+records.length+' records saved</div>';
    } else {
      document.getElementById("statusBadge").innerHTML = "";
    }
  }

  function showError(msg) {
    var el = document.getElementById("errorBox");
    el.textContent = msg;
    el.style.display = "block";
    setTimeout(function(){ el.style.display="none"; }, 6000);
  }

  function resetForm() {
    ["trackId","x","y","nameThai","botanical","genus","speciesepi",
     "gbh","height","crowncoverN","crowncovS","crowncovE","crowncovW"].forEach(function(id){
      document.getElementById(id).value = "";
    });
    document.getElementById("branches").innerHTML = "";
    addBranch(true);
    document.getElementById("crownTotal").textContent = "0.00 m";
  }

  function renderTable() {
    document.getElementById("tableCard").style.display = "block";
    document.getElementById("recordsBody").innerHTML = records.map(function(r){
      return "<tr>"
        +'<td class="td-time">'+r.savedAt+"</td>"
        +'<td class="td-id">'+r.trackId+"</td>"
        +"<td>"+(r.nameThai||"-")+"</td>"
        +'<td class="td-bot">'+(r.botanical||"-")+"</td>"
        +"<td>"+(r.gbh||"-")+"</td>"
        +"<td>"+(r.height||"-")+"</td>"
        +'<td class="td-crown">'+r.crownTotal+" m</td>"
        +"</tr>";
    }).join("");
    updateCountBadge();
  }

  async function submitForm() {
    var token = document.getElementById("ghToken").value.trim();
    if (!token) { showError("Please enter your GitHub Token first"); return; }

    var trackId = document.getElementById("trackId").value.trim();
    if (!trackId) { showError("Please enter Track ID"); return; }

    var crownTotal = updateTotal();
    var now = new Date();
    var timestamp = now.toLocaleString("th-TH");

    var row = [
      timestamp,
      trackId,
      document.getElementById("x").value,
      document.getElementById("y").value,
      document.getElementById("nameThai").value,
      document.getElementById("botanical").value,
      document.getElementById("genus").value,
      document.getElementById("speciesepi").value,
      document.getElementById("gbh").value,
      getBranches(),
      document.getElementById("height").value,
      document.getElementById("crowncoverN").value,
      document.getElementById("crowncovS").value,
      document.getElementById("crowncovE").value,
      document.getElementById("crowncovW").value,
      crownTotal
    ].map(csvEscape).join(",") + "\n";

    var btn = document.getElementById("submitBtn");
    btn.disabled = true;
    btn.textContent = "Saving...";

    var apiBase = "https://api.github.com/repos/" + GITHUB_USER + "/" + GITHUB_REPO + "/contents/" + CSV_FILE;
    var headers = {
      "Authorization": "token " + token,
      "Content-Type": "application/json",
      "Accept": "application/vnd.github.v3+json"
    };

    try {
      // Step 1: Get existing file (if any)
      var sha = null;
      var existingContent = CSV_HEADERS;

      var getResp = await fetch(apiBase, { headers: headers });
      if (getResp.ok) {
        var fileData = await getResp.json();
        sha = fileData.sha;
        existingContent = atob(fileData.content.replace(/\n/g,""));
      }

      // Step 2: Append new row
      var newContent = existingContent + row;
      var encoded = btoa(unescape(encodeURIComponent(newContent)));

      var body = {
        message: "Add tree record: " + trackId + " - " + timestamp,
        content: encoded
      };
      if (sha) body.sha = sha;

      var putResp = await fetch(apiBase, {
        method: "PUT",
        headers: headers,
        body: JSON.stringify(body)
      });

      if (!putResp.ok) {
        var err = await putResp.json();
        throw new Error(err.message || "GitHub API error");
      }

      // Success
      records.unshift({ trackId:trackId, nameThai:document.getElementById("nameThai").value,
        botanical:document.getElementById("botanical").value, gbh:document.getElementById("gbh").value,
        height:document.getElementById("height").value, crownTotal:crownTotal,
        savedAt:now.toLocaleTimeString() });
      renderTable();
      btn.className = "btn-submit success";
      btn.textContent = "Saved to GitHub!";
      showBadge("success", "&#10003; Saved to tree-inventory.csv");
      setTimeout(function(){
        btn.disabled = false;
        btn.className = "btn-submit";
        btn.textContent = "Save to GitHub CSV";
      }, 3000);
      resetForm();

    } catch(err) {
      btn.disabled = false;
      btn.textContent = "Save to GitHub CSV";
      showBadge("error", "&#10007; Error: " + err.message);
      showError("Error: " + err.message);
    }
  }
</script>
</body>
</html>
